name = "blawby-ai-chatbot"
account_id = "fa3dc6c06433f6b0ea78d95bce23ad91"
main = "index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CHAT_SESSIONS"
id = "9ca96bd55b2d4455bad3fe0cda914f14"  # BLAWBY_AI_CHAT_SESSIONS
preview_id = "e7bbadb101d44a828fb3ef34528b3540"  # BLAWBY_AI_CHAT_SESSIONS_preview

[[d1_databases]]
binding = "DB"
database_name = "blawby-ai-chatbot"
database_id = "e4ed51fa-4787-4222-afed-bcddfefd13bf"  # blawby-ai-chatbot
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "blawby-ai-files"

[[queues.producers]]
queue = "notification-events"
binding = "NOTIFICATION_EVENTS"

[[queues.consumers]]
queue = "notification-events"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "notification-events-dlq"

[[queues.producers]]
queue = "search-index-events"
binding = "SEARCH_INDEX_EVENTS"

[[queues.consumers]]
queue = "search-index-events"
max_batch_size = 25
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "search-index-events-dlq"

[[vectorize]]
binding = "SEARCH_VECTORS"
index_name = "blawby-search-vectors"

[ai]
binding = "AI"

[triggers]
crons = ["30 3 * * *"]

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v2"
new_classes = ["ChatRoom"]

[[migrations]]
tag = "v3"
deleted_classes = ["NotificationHub"]

[[durable_objects.bindings]]
name = "MATTER_PROGRESS"
class_name = "MatterProgressRoom"

[[durable_objects.bindings]]
name = "PRESENCE_ROOM"
class_name = "PresenceRoom"

[[migrations]]
tag = "v4"
new_classes = ["MatterProgressRoom"]

[[migrations]]
tag = "v5"
new_classes = ["PresenceRoom"]


