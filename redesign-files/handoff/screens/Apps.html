<!doctype html>
<html lang="en" data-theme="">
<head>
<meta charset="utf-8" />
<title>Blawby — Apps &amp; Integrations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  body{ background-image: radial-gradient(rgba(15,30,54,0.025) 1px, transparent 1.2px); background-size: 3px 3px; background-attachment: fixed; }

  .shell{ display:grid; grid-template-columns: 280px 1fr; min-height: 100vh; max-width: 1440px; margin: 0 auto; }

  /* ===== nav ===== */
  .side{
    border-right: 1px solid var(--rule);
    padding: 22px 16px;
    display:flex; flex-direction:column; gap: 14px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    background: color-mix(in oklab, var(--paper) 96%, var(--card));
  }
  .back{
    display:inline-flex; align-items:center; gap: 6px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--dim); cursor: pointer; padding: 4px 8px; margin-left: -8px;
  }
  .back:hover{ color: var(--ink); }
  .side h2{ font-family: var(--serif); font-weight:400; font-size: 28px; margin: 4px 0 0; letter-spacing:-.012em; }
  .side .org{ font-family:var(--mono); font-size:11px; color: var(--dim); letter-spacing: .04em; }

  .nav-section{ display:flex; flex-direction:column; gap: 1px; margin-top: 6px; }
  .nav-section .lbl{
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--dim-2); padding: 14px 10px 6px;
  }
  .nav-item{
    display:flex; align-items:center; gap: 10px;
    padding: 8px 10px; border-radius: var(--r-xs);
    font-size: 13.5px; color: var(--ink-2); cursor: pointer;
    transition: background .14s, color .14s;
  }
  .nav-item:hover{ background: var(--rule-soft); color: var(--ink); }
  .nav-item.on{ background: var(--ink); color: var(--accent); }
  .nav-item .ic{ width:14px; height:14px; opacity:.7; flex-shrink:0; }
  .nav-item.on .ic{ opacity: 1; }
  .nav-item .badge{ margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .nav-item.on .badge{ color: var(--accent); }

  /* ===== main ===== */
  .main{ padding: 36px 56px 80px; max-width: 920px; overflow-y: auto; }
  .crumb{
    font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 6px;
  }
  .main > h1{
    font-family: var(--serif); font-weight: 400; font-size: 48px; letter-spacing:-.02em;
    line-height: 1.05; margin: 0;
  }
  .main > h1 em{ color: var(--accent); }
  .main > .lede{ margin: 12px 0 36px; }

  /* ===== filter tabs ===== */
  .filter-row{ display: flex; align-items: center; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
  .ftab{
    padding: 6px 12px; font-size: 12.5px; border-radius: var(--r-xs);
    border: 1px solid transparent; cursor: pointer; color: var(--ink-2);
    transition: all .14s; font-family: var(--sans);
    background: transparent;
  }
  .ftab:hover{ background: var(--rule-soft); }
  .ftab.on{ background: var(--card); border-color: var(--rule); color: var(--ink); }
  .ftab .ct{ font-family: var(--mono); font-size: 10px; color: var(--dim); margin-left: 4px; }

  /* ===== apps grid ===== */
  .apps-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

  .app-card{
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--r-md);
    padding: 20px; cursor: pointer;
    transition: border-color .14s, box-shadow .14s, transform .12s;
    box-shadow: var(--shadow-1);
    display: flex; flex-direction: column; gap: 12px;
  }
  .app-card:hover{ border-color: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow-2); }
  .app-card .app-head{ display: flex; align-items: flex-start; gap: 14px; }
  .app-card .app-icon{
    width: 40px; height: 40px; border-radius: var(--r-sm);
    display: grid; place-items: center;
    font-weight: 700; font-size: 16px; flex-shrink: 0;
    font-family: var(--sans);
  }
  .app-card .app-info{ flex: 1; min-width: 0; }
  .app-card .app-name{ font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.2; }
  .app-card .app-by{ font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--dim); margin-top: 2px; }
  .app-card .app-desc{ font-size: 13px; color: var(--ink-2); line-height: 1.5; }

  .app-card .app-foot{ display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .app-card .app-scopes{ font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--dim); }

  .conn-badge{
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .04em; text-transform: uppercase;
    padding: 3px 8px; border-radius: var(--r-pill);
  }
  .conn-badge.live{ background: color-mix(in oklab, var(--pos) 12%, var(--card)); color: var(--pos); border: 1px solid color-mix(in oklab, var(--pos) 25%, var(--rule)); }
  .conn-badge.live::before{ content:""; width:5px; height:5px; border-radius:50%; background: var(--pos); }
  .conn-badge.off{ color: var(--dim); border: 1px solid var(--rule); }

  /* ===== section headers ===== */
  .section-hd{
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 16px; padding-top: 32px;
    border-top: 1px solid var(--rule);
  }
  .section-hd:first-of-type{ border-top: none; padding-top: 0; }
  .section-hd h3{ font-family: var(--serif); font-weight: 400; font-size: 22px; letter-spacing: -.01em; margin: 0; }
  .section-hd .ct{ font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: .06em; }

  /* ===== detail view ===== */
  .detail-back{
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--dim); cursor: pointer; margin-bottom: 18px;
    padding: 4px 0;
  }
  .detail-back:hover{ color: var(--ink); }

  .detail-hero{
    display: flex; align-items: flex-start; gap: 22px;
    margin-bottom: 32px;
  }
  .detail-hero .app-icon{
    width: 56px; height: 56px; border-radius: var(--r-md);
    display: grid; place-items: center;
    font-weight: 700; font-size: 22px; flex-shrink: 0;
    font-family: var(--sans);
  }
  .detail-hero .info{ flex: 1; }
  .detail-hero .info h1{
    font-family: var(--serif); font-weight: 400; font-size: 36px;
    letter-spacing: -.015em; line-height: 1.1; margin: 0;
  }
  .detail-hero .info h1 em{ color: var(--accent); }
  .detail-hero .info .by{
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    color: var(--dim); margin-top: 4px;
  }
  .detail-hero .info .desc{
    font-size: 15px; color: var(--ink-2); line-height: 1.55;
    margin-top: 10px; max-width: 56ch;
  }
  .detail-hero .actions{ display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }

  /* scopes */
  .scope-group{
    margin-bottom: 28px;
  }
  .scope-group h3{
    font-family: var(--serif); font-weight: 400; font-size: 22px;
    letter-spacing: -.01em; margin: 0 0 4px;
  }
  .scope-group .gdesc{ font-size: 13.5px; color: var(--dim); margin: 0 0 18px; max-width: 60ch; }

  .scope-row{
    display: grid; grid-template-columns: 1fr auto;
    gap: 18px; align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
  }
  .scope-row:last-child{ border-bottom: none; }
  .scope-row .s-meta{ display: flex; flex-direction: column; gap: 3px; }
  .scope-row .s-name{ font-size: 14px; font-weight: 500; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .scope-row .s-name code{ font-family: var(--mono); font-size: 11px; color: var(--dim); font-weight: 400; background: var(--rule-soft); padding: 1px 6px; border-radius: 3px; }
  .scope-row .s-desc{ font-size: 13px; color: var(--dim); line-height: 1.5; max-width: 56ch; }
  .scope-row .s-req{ font-family: var(--mono); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--dim-2); margin-top: 2px; }

  /* connection info */
  .conn-info{
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--r-md);
    padding: 18px; margin-bottom: 22px; box-shadow: var(--shadow-1);
  }
  .conn-info .ci-head{ display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .conn-info .ci-head h4{ font-family: var(--serif); font-weight: 400; font-size: 18px; margin: 0; }
  .conn-info .ci-row{ display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--rule); }
  .conn-info .ci-row:last-child{ border-bottom: none; }
  .conn-info .ci-label{ font-family: var(--mono); font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); }
  .conn-info .ci-val{ font-size: 13.5px; color: var(--ink); font-family: var(--mono); font-size: 12px; }

  /* ===== oauth modal ===== */
  .modal-overlay{
    position: fixed; inset: 0; z-index: 100;
    background: rgba(15,30,54,0.55);
    display: grid; place-items: center;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn{ from{ opacity: 0; } to{ opacity: 1; } }
  @keyframes rise{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform:none; } }

  .modal{
    background: var(--card); border: 1px solid var(--rule);
    border-radius: var(--r-md); box-shadow: var(--shadow-3);
    width: 520px; max-width: 92vw; max-height: 90vh;
    overflow-y: auto; animation: rise .35s cubic-bezier(.2,.7,.2,1);
  }
  .modal-head{
    padding: 28px 28px 0;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }
  .modal-head .app-icon{
    width: 52px; height: 52px; border-radius: var(--r-md);
    display: grid; place-items: center;
    font-weight: 700; font-size: 20px; margin-bottom: 16px;
    font-family: var(--sans);
  }
  .modal-head h2{
    font-family: var(--serif); font-weight: 400; font-size: 26px;
    letter-spacing: -.01em; margin: 0 0 6px; line-height: 1.15;
  }
  .modal-head h2 em{ color: var(--accent); }
  .modal-head .sub{ font-size: 14px; color: var(--ink-2); line-height: 1.5; max-width: 40ch; }
  .modal-head .org-line{
    margin-top: 14px; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-2);
  }
  .modal-head .org-line .av{
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--ink); color: var(--accent);
    font-family: var(--serif); font-style: italic; font-size: 11px;
    display: grid; place-items: center;
  }

  .modal-body{ padding: 22px 28px; }
  .modal-body .consent-label{
    font-family: var(--mono); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 12px;
  }

  .consent-scope{
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--rule);
  }
  .consent-scope:last-child{ border-bottom: none; }
  .consent-scope .cs-icon{
    width: 28px; height: 28px; border-radius: var(--r-xs);
    background: var(--rule-soft); display: grid; place-items: center;
    font-size: 13px; flex-shrink: 0; color: var(--ink-2); margin-top: 1px;
  }
  .consent-scope .cs-info{ flex: 1; }
  .consent-scope .cs-name{ font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .consent-scope .cs-desc{ font-size: 12.5px; color: var(--dim); line-height: 1.45; margin-top: 2px; }
  .consent-scope .cs-perm{
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .06em;
    text-transform: uppercase; padding: 2px 6px; border-radius: var(--r-pill);
    flex-shrink: 0; margin-top: 3px;
  }
  .cs-perm.read{ color: var(--pos); background: color-mix(in oklab, var(--pos) 10%, var(--card)); border: 1px solid color-mix(in oklab, var(--pos) 20%, var(--rule)); }
  .cs-perm.write{ color: var(--warn); background: color-mix(in oklab, var(--warn) 10%, var(--card)); border: 1px solid color-mix(in oklab, var(--warn) 20%, var(--rule)); }
  .cs-perm.admin{ color: var(--neg); background: color-mix(in oklab, var(--neg) 10%, var(--card)); border: 1px solid color-mix(in oklab, var(--neg) 20%, var(--rule)); }

  .modal-trust{
    margin: 14px 0 0; padding: 14px 0 0; border-top: 1px solid var(--rule);
    font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
    color: var(--dim-2); text-align: center; line-height: 1.6;
  }

  .modal-foot{
    padding: 18px 28px 24px;
    display: flex; gap: 10px; justify-content: flex-end;
  }

  /* ===== BYOK ===== */
  .key-card{
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--r-md);
    padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow-1);
    display: flex; align-items: center; gap: 16px;
  }
  .key-card .key-icon{
    width: 36px; height: 36px; border-radius: var(--r-sm);
    display: grid; place-items: center; font-size: 14px; flex-shrink: 0;
    font-family: var(--mono); font-weight: 600;
  }
  .key-card .key-info{ flex: 1; min-width: 0; }
  .key-card .key-name{ font-size: 14px; font-weight: 500; color: var(--ink); }
  .key-card .key-hint{
    font-family: var(--mono); font-size: 12px; color: var(--dim);
    margin-top: 2px; display: flex; align-items: center; gap: 8px;
  }
  .key-card .key-hint .mask{ letter-spacing: .08em; }
  .key-card .key-meta{
    display: flex; gap: 14px; margin-top: 6px;
  }
  .key-card .key-meta span{
    font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
    color: var(--dim-2);
  }
  .key-card .key-actions{ display: flex; gap: 6px; flex-shrink: 0; }

  .key-form{
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--r-md);
    padding: 22px; margin-bottom: 12px; box-shadow: var(--shadow-1);
  }
  .key-form h4{
    font-family: var(--serif); font-weight: 400; font-size: 18px;
    margin: 0 0 4px; letter-spacing: -.005em;
  }
  .key-form .kf-desc{ font-size: 13px; color: var(--dim); margin: 0 0 18px; }
  .key-form .kf-row{ display: flex; gap: 12px; align-items: flex-end; margin-bottom: 14px; }
  .key-form .kf-row .field{ flex: 1; }
  .key-form .kf-help{
    font-size: 12px; color: var(--dim); line-height: 1.5; margin-top: 8px;
    padding: 10px 14px; background: var(--rule-soft); border-radius: var(--r-xs);
  }
  .key-form .kf-help code{
    font-family: var(--mono); font-size: 11px; background: var(--card);
    padding: 1px 5px; border-radius: 2px; color: var(--ink-2);
  }

  /* ===== oauth success state ===== */
  .success-card{
    background: color-mix(in oklab, var(--pos) 8%, var(--card));
    border: 1px solid color-mix(in oklab, var(--pos) 25%, var(--rule));
    border-radius: var(--r-md); padding: 22px;
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 22px;
  }
  .success-card .sc-icon{
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--pos); color: white;
    display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
  }
  .success-card .sc-body h4{ font-family: var(--serif); font-weight: 400; font-size: 18px; margin: 0 0 4px; }
  .success-card .sc-body p{ font-size: 13.5px; color: var(--ink-2); margin: 0; line-height: 1.5; }

  @media (max-width: 980px){
    .shell{ grid-template-columns: 1fr; }
    .side{ display:none; }
    .main{ padding: 24px 22px; }
    .apps-grid{ grid-template-columns: 1fr; }
    .detail-hero{ flex-direction: column; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>

/* ---------- OAuth Consent Modal ---------- */
function OAuthModal({ appId, onClose, onAuthorize }) {
  const app = APPS.find(a => a.id === appId);
  if (!app) return null;

  const [step, setStep] = React.useState('consent'); // consent | scopes | authorizing | done
  const [selectedScopes, setSelectedScopes] = React.useState(() => {
    const init = {};
    app.scopes.forEach(s => { init[s.id] = s.required; });
    return init;
  });

  const toggleScope = (id, required) => {
    if (required) return;
    setSelectedScopes(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const handleAuthorize = () => {
    setStep('authorizing');
    setTimeout(() => {
      setStep('done');
      setTimeout(() => {
        onAuthorize(appId);
      }, 1800);
    }, 2000);
  };

  const permIcon = (perm) => {
    if (perm === 'read') return '◎';
    if (perm === 'write') return '✎';
    return '⚙';
  };

  return (
    <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget && step !== 'authorizing') onClose(); }}>
      <div className="modal">
        <div className="modal-head">
          <AppIcon icon={app.icon} size={52} />

          {step === 'consent' && (
            <>
              <h2>Connect <em>{app.name}</em></h2>
              <div className="sub">{app.name} will be able to access data in your Blawby workspace. Review the permissions below.</div>
              <div className="org-line">
                <span className="av">B</span>
                Law Offices of Sarah Chen
              </div>
            </>
          )}

          {step === 'scopes' && (
            <>
              <h2>Choose <em>permissions</em></h2>
              <div className="sub">Required scopes are locked on. Toggle optional scopes based on what you need.</div>
            </>
          )}

          {step === 'authorizing' && (
            <>
              <h2>Connecting…</h2>
              <div className="sub">Authenticating with {app.by} via Better Auth OAuth 2.0</div>
            </>
          )}

          {step === 'done' && (
            <>
              <h2 style={{ color: 'var(--pos)' }}>Connected</h2>
              <div className="sub">{app.name} is now linked to your workspace. Redirecting…</div>
            </>
          )}
        </div>

        {step === 'consent' && (
          <>
            <div className="modal-body">
              <div className="consent-label">This app will be able to</div>
              {app.scopes.filter(s => s.required).map(scope => (
                <div key={scope.id} className="consent-scope">
                  <div className="cs-icon">{permIcon(scope.perm)}</div>
                  <div className="cs-info">
                    <div className="cs-name">{scope.name}</div>
                    <div className="cs-desc">{scope.desc}</div>
                  </div>
                  <span className={'cs-perm ' + scope.perm}>{scope.perm}</span>
                </div>
              ))}

              {app.scopes.filter(s => !s.required).length > 0 && (
                <>
                  <div className="consent-label" style={{ marginTop: 18 }}>Optional permissions</div>
                  {app.scopes.filter(s => !s.required).map(scope => (
                    <div key={scope.id} className="consent-scope">
                      <div className="cs-icon">{permIcon(scope.perm)}</div>
                      <div className="cs-info">
                        <div className="cs-name">{scope.name}</div>
                        <div className="cs-desc">{scope.desc}</div>
                      </div>
                      <span className={'cs-perm ' + scope.perm}>{scope.perm}</span>
                    </div>
                  ))}
                </>
              )}

              <div className="modal-trust">
                Better Auth OAuth 2.0 · encrypted in transit · tokens stored in your org vault<br></br>
                Blawby never shares credentials across organizations
              </div>
            </div>

            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-ghost" onClick={() => setStep('scopes')}>Customize scopes</button>
              <button className="btn btn-primary" onClick={handleAuthorize}>Authorize &amp; connect →</button>
            </div>
          </>
        )}

        {step === 'scopes' && (
          <>
            <div className="modal-body">
              {app.scopes.map(scope => (
                <div key={scope.id} className="consent-scope" style={{ alignItems: 'center' }}>
                  <div className="cs-icon" style={{ background: selectedScopes[scope.id] ? 'color-mix(in oklab, var(--accent) 15%, var(--rule-soft))' : 'var(--rule-soft)' }}>
                    {permIcon(scope.perm)}
                  </div>
                  <div className="cs-info" style={{ flex: 1 }}>
                    <div className="cs-name">{scope.name} <code style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--dim)', background: 'var(--rule-soft)', padding: '1px 5px', borderRadius: 3, fontWeight: 400 }}>{scope.id}</code></div>
                    <div className="cs-desc">{scope.desc}</div>
                    {scope.required && (
                      <div style={{ fontFamily: 'var(--mono)', fontSize: '9.5px', letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--dim-2)', marginTop: 3 }}>required for core functionality</div>
                    )}
                  </div>
                  <span
                    className={'toggle' + (selectedScopes[scope.id] ? ' on' : '')}
                    style={ scope.required ? { opacity: 0.5, cursor: 'not-allowed' } : { cursor: 'pointer' } }
                    onClick={() => toggleScope(scope.id, scope.required)}
                  ></span>
                </div>
              ))}
            </div>

            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={() => setStep('consent')}>← Back</button>
              <button className="btn btn-primary" onClick={handleAuthorize}>Authorize with {Object.values(selectedScopes).filter(Boolean).length} scopes →</button>
            </div>
          </>
        )}

        {step === 'authorizing' && (
          <div className="modal-body" style={{ textAlign: 'center', padding: '32px 28px 40px' }}>
            <div style={{
              width: 40, height: 40, border: '3px solid var(--rule)',
              borderTopColor: 'var(--accent)', borderRadius: '50%',
              margin: '0 auto 18px',
              animation: 'spin .8s linear infinite',
            }}></div>
            <style>{'@keyframes spin{ to{ transform:rotate(360deg) } }'}</style>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--dim)' }}>
              Exchanging tokens…
            </div>
          </div>
        )}

        {step === 'done' && (
          <div className="modal-body" style={{ textAlign: 'center', padding: '28px 28px 36px' }}>
            <div style={{
              width: 48, height: 48, borderRadius: '50%',
              background: 'var(--pos)', color: '#fff',
              display: 'grid', placeItems: 'center',
              fontSize: 22, margin: '0 auto 14px',
            }}>✓</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--pos)' }}>
              Token stored · sync starting
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        <div className="key-form">
          <h4>Add API key</h4>
          <p className="kf-desc">Your key is encrypted with your org's vault key before storage. Blawby staff cannot read it.</p>

          <div className="kf-row">
            <div className="field">
              <label>Provider</label>
              <select className="select" value={provider} onChange={e => setProvider(e.target.value)}>
                {providers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Label</label>
              <input className="input" placeholder="e.g. Production" value={keyName} onChange={e => setKeyName(e.target.value)} />
            </div>
          </div>

          <div className="field" style={{ marginBottom: 14 }}>
            <label>API key</label>
            <input
              className="input"
              type="password"
              placeholder={providers.find(p => p.id === provider).prefix + '••••••••'}
              value={keyValue}
              onChange={e => setKeyValue(e.target.value)}
              style={{ fontFamily: 'var(--mono)', fontSize: 13 }}
            />
          </div>

          <div className="kf-help">
            Keys are validated on save. The assistant will use your key instead of Blawby's managed model for all AI operations.
            Your data is sent directly to <code>{providers.find(p => p.id === provider).name}</code>'s API — Blawby does not proxy or cache model responses.
          </div>

          <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
            <button className="btn btn-primary" onClick={handleAdd}>Save key</button>
            <button className="btn btn-ghost" onClick={() => setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}
    </>
  );
}


/* ============================================================
   APP
   ============================================================ */
function App() {
  const [view, setView] = React.useState('index'); // index | detail
  const [selectedApp, setSelectedApp] = React.useState(null);
  const [filter, setFilter] = React.useState('all');
  const [showOAuth, setShowOAuth] = React.useState(null);
  const [apps, setApps] = React.useState(APPS);

  const handleSelect = (appId) => {
    setSelectedApp(appId);
    setView('detail');
    window.scrollTo(0, 0);
  };

  const handleBack = () => {
    setView('index');
    setSelectedApp(null);
  };

  const handleConnect = (appId) => {
    setShowOAuth(appId);
  };

  const handleAuthorize = (appId) => {
    // Update the app to be connected
    const idx = APPS.findIndex(a => a.id === appId);
    if (idx >= 0) {
      APPS[idx] = {
        ...APPS[idx],
        connected: true,
        connectedAs: 'user@sarahchenlaw.com',
        connectedAt: 'Just now',
      };
      APPS[idx].scopes = APPS[idx].scopes.map(s => ({ ...s, granted: s.required }));
    }
    setShowOAuth(null);
    setView('detail');
    setSelectedApp(appId);
  };

  return (
    <div className="shell">
      <Sidebar view={view} />
      <main className="main">
        {view === 'index' && (
          <AppsIndex
            onSelect={handleSelect}
            filter={filter}
            setFilter={setFilter}
          />
        )}
        {view === 'detail' && (
          <AppDetail
            appId={selectedApp}
            onBack={handleBack}
            onConnect={handleConnect}
          />
        )}
        {showOAuth && (
          <OAuthModal
            appId={showOAuth}
            onClose={() => setShowOAuth(null)}
            onAuthorize={handleAuthorize}
          />
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
