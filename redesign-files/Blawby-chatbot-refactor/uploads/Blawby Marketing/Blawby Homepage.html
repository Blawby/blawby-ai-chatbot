<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Blawby — Legal practice software for solo and small-firm attorneys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Navy + gold — light mode (default) */
    --paper: #f6f3ea;
    --paper-2: #ece6d3;
    --ink: #0f1e36;
    --ink-2: #2a3b5a;
    --dim: #6b7790;
    --rule: #d3d6df;
    --accent: oklch(0.72 0.13 82);
    --accent-soft: oklch(0.72 0.13 82 / 0.14);
    --accent-deep: oklch(0.55 0.12 78);
    --serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
    --sans: "Geist", ui-sans-serif, system-ui, sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", monospace;
    --container: 1280px;
    --gutter: 56px;
  }
  /* Dark mode — navy paper, cream ink, gold accent */
  html[data-theme="dark"] {
    --paper: #0c1830;
    --paper-2: #142142;
    --ink: #f1ecdc;
    --ink-2: #c9c4b3;
    --dim: #7a8198;
    --rule: #1d2c4f;
    --accent: oklch(0.78 0.13 82);
    --accent-soft: oklch(0.78 0.13 82 / 0.16);
    --accent-deep: oklch(0.66 0.13 80);
  }
  html[data-theme="midnight"] {
    --paper: #050c1c;
    --paper-2: #0c142a;
    --ink: #ede7d3;
    --ink-2: #c3bda7;
    --dim: #6e7488;
    --rule: #15203b;
    --accent: oklch(0.80 0.14 84);
    --accent-soft: oklch(0.80 0.14 84 / 0.16);
    --accent-deep: oklch(0.66 0.13 80);
  }
  html[data-theme="parchment"] {
    --paper: #f0eadb;
    --paper-2: #e2dabf;
    --ink: #0a1a30;
    --ink-2: #28385a;
    --dim: #6c7286;
    --rule: #cdc9b8;
    --accent: oklch(0.66 0.13 82);
    --accent-soft: oklch(0.66 0.13 82 / 0.14);
    --accent-deep: oklch(0.52 0.11 78);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "ss01", "cv11";
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent); color: var(--paper); }

  a { color: inherit; text-decoration: none; }
  em { font-style: italic; color: var(--accent-deep); }
  html[data-theme="dark"] em, html[data-theme="midnight"] em { color: var(--accent); }
  ul { list-style: none; padding: 0; margin: 0; }

  .container { max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }
  @media (max-width: 1100px) { :root { --gutter: 40px; } }
  @media (max-width: 720px) { :root { --gutter: 22px; } }

  .display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.012em; line-height: 1.05; text-wrap: balance; }
  .mono { font-family: var(--mono); font-weight: 400; font-size: 11px; letter-spacing: 0.04em; color: var(--dim); }
  .small-caps { text-transform: uppercase; }
  .dim { color: var(--dim); }
  .lede { font-size: 18px; line-height: 1.5; color: var(--ink-2); text-wrap: pretty; max-width: 56ch; }

  /* ---------- NAV ---------- */
  .site-nav {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--paper) 88%, transparent);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-left { display: flex; align-items: center; gap: 40px; }
  .brand-mark { display: inline-flex; align-items: baseline; gap: 8px; }
  .brand-mark-glyph {
    font-size: 22px; line-height: 1; color: var(--accent);
    transform: translateY(2px);
  }
  .brand-mark-word { font-size: 20px; letter-spacing: -0.01em; }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a { font-size: 14px; color: var(--ink-2); position: relative; }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -6px; height: 1px; background: var(--accent);
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-right a.sign-in { font-size: 14px; color: var(--ink-2); }

  /* ---------- BUTTONS ---------- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; font-size: 14px; line-height: 1; font-weight: 500;
    border-radius: 2px; border: 1px solid transparent;
    transition: all 0.18s ease;
    font-family: var(--sans);
    cursor: pointer;
  }
  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--rule); }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn-lg { padding: 16px 26px; font-size: 15px; }

  /* ---------- HERO ---------- */
  .hero {
    padding: 80px 0 32px;
    position: relative;
    border-bottom: 1px solid var(--rule);
  }
  .hero-meta {
    display: flex; gap: 16px; align-items: center;
    margin-bottom: 32px;
  }
  .hero-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .hero-grid {
    display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr); gap: 56px; align-items: end;
  }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 32px; } }
  .h1 {
    font-size: clamp(48px, 6.4vw, 92px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    margin: 0;
  }
  .h1 em { font-style: italic; color: var(--accent); }
  .hero-sub {
    font-size: 19px; line-height: 1.5;
    color: var(--ink-2);
    max-width: 46ch;
    text-wrap: pretty;
    margin: 0 0 28px;
  }
  .hero-side {
    display: flex; flex-direction: column; gap: 20px; padding-bottom: 8px;
  }
  .hero-stat {
    display: flex; align-items: baseline; gap: 12px;
    padding: 16px 0; border-top: 1px solid var(--rule);
  }
  .hero-stat:last-child { border-bottom: 1px solid var(--rule); }
  .hero-stat .display { font-size: 32px; }
  .hero-stat-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); }
  .hero-ctas { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }

  /* ---------- WORKFLOW HERO ---------- */
  .workflow-hero {
    margin-top: 56px;
    padding: 28px 0 0;
    border-top: 1px solid var(--rule);
  }
  .workflow-meta {
    display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .workflow-track { position: relative; padding: 24px 0 0; }
  .workflow-line {
    position: absolute; left: 4%; right: 4%; top: 64px;
    width: 92%; height: 2px; pointer-events: none;
  }
  .workflow-steps {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    position: relative; z-index: 2;
  }
  @media (max-width: 880px) {
    .workflow-steps { grid-template-columns: repeat(2, 1fr); }
    .workflow-line { display: none; }
  }
  .wf-step {
    opacity: 0; transform: translateY(14px);
    transition: opacity 600ms ease, transform 600ms cubic-bezier(0.2,0.7,0.2,1);
  }
  .wf-step.is-in { opacity: 1; transform: translateY(0); }
  .wf-node {
    height: 32px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .wf-dot {
    width: 12px; height: 12px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 6px var(--paper), 0 0 0 7px var(--rule);
  }
  .wf-card {
    border: 1px solid var(--rule);
    background: var(--paper);
    padding: 18px 18px 20px;
    min-height: 132px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .wf-card:hover { border-color: var(--ink); }
  .wf-num { font-size: 11px; color: var(--accent); margin-bottom: 8px; }
  .wf-label { font-family: var(--serif); font-size: 22px; line-height: 1; letter-spacing: -0.01em; margin-bottom: 8px; }
  .wf-desc { font-size: 13px; line-height: 1.45; color: var(--ink-2); }

  /* ---------- SECTION LABEL ---------- */
  .section-label {
    display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
  }
  .section-label .mono { color: var(--accent); }
  .section-label .rule { flex: 1; height: 1px; background: var(--rule); }

  .h2 {
    font-size: clamp(32px, 4.2vw, 56px);
    line-height: 1.02;
    letter-spacing: -0.018em;
    margin: 0 0 24px;
    max-width: 22ch;
  }
  .h3 {
    font-size: clamp(26px, 2.6vw, 36px);
    line-height: 1.05; letter-spacing: -0.015em;
    margin: 0 0 16px;
  }

  /* ---------- PLACEHOLDER ---------- */
  .ph {
    position: relative; width: 100%;
    border: 1px solid var(--rule);
    overflow: hidden;
    background: var(--paper-2);
  }
  .ph-stripes {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      135deg,
      transparent 0 14px,
      color-mix(in oklab, var(--rule) 70%, transparent) 14px 15px
    );
    opacity: 0.7;
  }
  .ph-caption {
    position: absolute; inset: auto 0 0 0;
    padding: 10px 14px;
    background: var(--paper);
    border-top: 1px solid var(--rule);
    color: var(--dim);
  }

  /* ---------- PROBLEM ---------- */
  .section-problem { padding: 120px 0 100px; border-bottom: 1px solid var(--rule); }
  .problem-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 64px; align-items: start; }
  @media (max-width: 880px) { .problem-grid { grid-template-columns: 1fr; gap: 24px; } }
  .problem-side .lede + .lede { margin-top: 16px; }
  .stitched-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 56px; }
  .stitched-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border: 1px solid var(--rule);
    color: var(--dim);
    font-size: 12px;
    border-radius: 2px;
    background: var(--paper);
    text-decoration: line-through;
    text-decoration-color: color-mix(in oklab, var(--accent) 70%, transparent);
    text-decoration-thickness: 1px;
  }
  .stitched-x { color: var(--accent); text-decoration: none; }

  /* ---------- WORKFLOW DETAIL ---------- */
  .section-workflow { padding: 120px 0 80px; border-bottom: 1px solid var(--rule); background: var(--paper); }
  .workflow-h2 { margin-bottom: 80px; }
  .workflow-rows { display: flex; flex-direction: column; }
  .wf-row { padding: 64px 0; border-top: 1px solid var(--rule); }
  .wf-row:last-child { border-bottom: 1px solid var(--rule); }
  .wf-row-inner {
    display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: center;
  }
  .wf-row-rev .wf-row-inner { grid-template-columns: 1.1fr 1fr; direction: rtl; }
  .wf-row-rev .wf-row-inner > * { direction: ltr; }
  @media (max-width: 980px) {
    .wf-row-inner, .wf-row-rev .wf-row-inner { grid-template-columns: 1fr; gap: 32px; direction: ltr; }
  }
  .wf-row-meta { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; }
  .big-num {
    font-family: var(--serif); font-size: 56px; line-height: 0.9; color: var(--accent);
    letter-spacing: -0.02em; font-weight: 300;
  }
  .wf-bullets { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
  .wf-bullets li { font-size: 15px; color: var(--ink-2); display: flex; gap: 10px; align-items: baseline; }
  .bullet-mark { color: var(--accent); font-size: 18px; }

  /* ---------- FEATURE CARDS ---------- */
  .section-features { padding: 120px 0 100px; border-bottom: 1px solid var(--rule); }
  .feature-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--rule); border: 1px solid var(--rule); margin-top: 48px;
  }
  @media (max-width: 880px) { .feature-grid { grid-template-columns: 1fr; } }
  .feature-card {
    background: var(--paper); padding: 32px 28px 28px;
    display: flex; flex-direction: column; gap: 12px;
    min-height: 240px; transition: background 0.2s;
    position: relative;
  }
  .feature-card:hover { background: var(--paper-2); }
  .feature-card:hover .feature-arrow { transform: translate(2px, -2px); color: var(--accent); }
  .feature-top { display: flex; justify-content: space-between; align-items: center; }
  .feature-arrow { font-size: 16px; color: var(--dim); transition: all 0.2s; }
  .feature-name { font-size: 32px; line-height: 1; margin-top: 8px; }
  .feature-lines { color: var(--ink-2); font-size: 14.5px; line-height: 1.5; }
  .feature-foot { margin-top: auto; color: var(--accent); padding-top: 16px; }

  /* ---------- COMPLIANCE ---------- */
  .section-compliance {
    padding: 120px 0; border-bottom: 1px solid var(--rule);
  }
  .compliance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  @media (max-width: 880px) { .compliance-grid { grid-template-columns: 1fr; gap: 40px; } }
  .compliance-list { margin-top: 28px; display: flex; flex-direction: column; gap: 14px; }
  .compliance-list li { display: flex; gap: 14px; color: var(--ink-2); font-size: 15px; line-height: 1.5; }
  .light-mono { color: var(--accent-deep); flex-shrink: 0; min-width: 24px; }
  .compliance-card {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 28px 28px 24px;
    font-family: var(--sans);
  }
  .cc-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 0; border-bottom: 1px solid var(--rule);
    font-size: 14.5px; color: var(--ink);
  }
  .cc-row-head { color: var(--dim); padding-top: 0; }
  .cc-row-head .mono { color: var(--dim); }
  .cc-row-foot { font-family: var(--serif); font-size: 20px; color: var(--ink); border-bottom: none; padding-top: 18px; }
  .cc-row-foot .mono { font-family: var(--mono); font-size: 13px; color: var(--ink); letter-spacing: 0; }
  .pos { color: oklch(0.55 0.14 145); }
  .neg { color: oklch(0.55 0.14 30); }
  .cc-stamp { margin-top: 14px; color: var(--dim); }

  /* ---------- COMPARE ---------- */
  .section-compare { padding: 120px 0 100px; border-bottom: 1px solid var(--rule); }
  .compare-table { margin-top: 48px; border-top: 1px solid var(--rule); }
  .compare-head, .compare-row {
    display: grid; grid-template-columns: 2fr 1fr 1fr;
    border-bottom: 1px solid var(--rule);
  }
  .compare-head { padding: 20px 0 16px; }
  .compare-h { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .compare-h .display { font-size: 22px; }
  .compare-h-us .display { color: var(--accent); }
  .compare-row { padding: 18px 0; align-items: center; }
  .compare-cell { font-size: 15px; }
  .compare-cell-label { color: var(--ink-2); }
  .compare-cell-us, .compare-row .compare-cell:nth-child(3) { text-align: center; }
  .check { color: var(--accent); font-size: 14px; }
  .dim-check { color: var(--dim); }
  .cross { color: var(--rule); }

  /* ---------- PRICING ---------- */
  .section-pricing { padding: 120px 0 100px; border-bottom: 1px solid var(--rule); }
  .pricing-card {
    margin-top: 48px; display: grid; grid-template-columns: 1.4fr 1fr;
    border: 1px solid var(--rule); background: var(--paper);
  }
  @media (max-width: 880px) { .pricing-card { grid-template-columns: 1fr; } }
  .pricing-main { padding: 48px; border-right: 1px solid var(--rule); }
  @media (max-width: 880px) { .pricing-main { border-right: none; border-bottom: 1px solid var(--rule); padding: 32px; } }
  .pricing-amount { display: flex; align-items: baseline; gap: 18px; margin-bottom: 24px; }
  .price-num { font-size: 96px; line-height: 0.9; letter-spacing: -0.025em; color: var(--accent); }
  .price-unit { display: flex; flex-direction: column; gap: 4px; padding-bottom: 12px; }
  .pricing-note { font-size: 15px; line-height: 1.55; color: var(--ink-2); max-width: 38ch; margin: 0 0 28px; }
  .pricing-side { padding: 32px; display: flex; flex-direction: column; }
  .pricing-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 18px 0; border-bottom: 1px solid var(--rule);
  }
  .pricing-row-last { border-bottom: none; }
  .pricing-row .display { font-size: 22px; }

  /* ---------- DOCS ---------- */
  .section-docs { padding: 120px 0 100px; border-bottom: 1px solid var(--rule); }
  .docs-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: 40px; flex-wrap: wrap; }
  .docs-head .h2 { margin-bottom: 0; }
  .docs-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  }
  @media (max-width: 980px) { .docs-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .docs-grid { grid-template-columns: 1fr; } }
  .docs-card {
    background: var(--paper); border: 1px solid var(--rule);
    padding: 24px; display: flex; flex-direction: column; gap: 14px;
    min-height: 180px; transition: all 0.2s;
  }
  .docs-card:hover { border-color: var(--ink); transform: translateY(-2px); }
  .docs-card-top { display: flex; justify-content: space-between; }
  .docs-card-top .mono { color: var(--accent); }
  .docs-card-name { font-size: 26px; line-height: 1; }
  .docs-card-lines { font-size: 14px; color: var(--ink-2); line-height: 1.5; }

  /* ---------- FAQ ---------- */
  .section-faq { padding: 120px 0 100px; border-bottom: 1px solid var(--rule); }
  .faq-list { margin-top: 48px; border-top: 1px solid var(--rule); }
  .faq-item {
    display: block; width: 100%; text-align: left;
    background: transparent; border: none; border-bottom: 1px solid var(--rule);
    padding: 24px 0; cursor: pointer; font: inherit; color: inherit;
  }
  .faq-q-row { display: grid; grid-template-columns: 80px 1fr 24px; gap: 24px; align-items: baseline; }
  .faq-num { color: var(--accent); padding-top: 6px; }
  .faq-q { font-size: 22px; line-height: 1.25; }
  .faq-toggle { color: var(--dim); font-size: 16px; text-align: right; }
  .faq-a-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s; }
  .faq-item.is-open .faq-a-wrap { grid-template-rows: 1fr; }
  .faq-a {
    overflow: hidden;
    padding-left: 104px; padding-right: 48px;
    color: var(--ink-2); font-size: 16px; line-height: 1.55;
  }
  .faq-item.is-open .faq-a { padding-top: 14px; }
  @media (max-width: 700px) {
    .faq-q-row { grid-template-columns: 56px 1fr 20px; gap: 12px; }
    .faq-a { padding-left: 68px; padding-right: 0; }
  }

  /* ---------- CTA ---------- */
  .section-cta {
    padding: 140px 0; text-align: center;
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule);
  }
  .cta-top { display: flex; align-items: center; gap: 16px; justify-content: center; margin-bottom: 36px; }
  .cta-top .rule { width: 80px; height: 1px; background: var(--rule); }
  .cta-h { font-size: clamp(40px, 5.5vw, 76px); line-height: 1.02; max-width: 18ch; margin: 0 auto 40px; letter-spacing: -0.022em; }
  .cta-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
  .cta-meta { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; color: var(--dim); }
  .cta-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--dim); align-self: center; }

  /* ---------- FOOTER ---------- */
  .site-footer { background: var(--paper); padding-top: 80px; }
  .footer-grid {
    display: grid; grid-template-columns: 1.6fr repeat(4, 1fr); gap: 48px;
    padding-bottom: 64px; border-bottom: 1px solid var(--rule);
  }
  @media (max-width: 880px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }
  .footer-brand .brand-mark { margin-bottom: 16px; }
  .footer-tag { color: var(--ink-2); font-size: 14px; line-height: 1.5; margin: 0 0 24px; max-width: 32ch; }
  .footer-meta { display: flex; gap: 12px; align-items: center; color: var(--dim); }
  .footer-meta .rule { width: 24px; height: 1px; background: var(--rule); display: inline-block; }
  .footer-col .footer-h { color: var(--dim); margin-bottom: 16px; }
  .footer-col ul { display: flex; flex-direction: column; gap: 10px; }
  .footer-col a { font-size: 14px; color: var(--ink-2); }
  .footer-col a:hover { color: var(--accent); }
  .footer-bottom {
    padding: 24px 0; display: flex; justify-content: space-between; align-items: center;
    color: var(--dim); flex-wrap: wrap; gap: 12px;
  }

  /* ---------- HERO STAT decoration ---------- */
  .corner-mark {
    position: absolute; top: 24px; right: var(--gutter);
    display: flex; gap: 12px; align-items: center;
    color: var(--dim);
  }
  .corner-mark .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="workflow-hero.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark"
}/*EDITMODE-END*/;

function SiteNav() {
  return (
    <nav className="site-nav">
      <div className="container nav-inner">
        <div className="nav-left">
          <a href="#" className="brand-mark">
            <span className="brand-mark-glyph display">B.</span>
            <span className="brand-mark-word display">Blawby</span>
          </a>
          <div className="nav-links">
            <a href="#features">Product</a>
            <a href="#pricing">Pricing</a>
            <a href="#docs">Docs</a>
            <a href="#trust">Trust & IOLTA</a>
          </div>
        </div>
        <div className="nav-right">
          <a className="sign-in" href="#signin">Sign in</a>
          <a className="btn btn-primary" href="#start">Start now</a>
        </div>
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <section className="hero">
      <div className="container">
        <div className="hero-meta">
          <span className="dot" />
          <span className="mono small-caps">Blawby · v. 2026.5</span>
          <span className="mono small-caps dim">Last verified May 7, 2026</span>
        </div>
        <div className="hero-grid">
          <div>
            <h1 className="display h1">
              Run a law practice, <em>not a software stack.</em>
            </h1>
          </div>
          <div className="hero-side">
            <p className="hero-sub">
              Blawby is the one place to capture intake, send engagement letters, manage matters, invoice clients, and collect IOLTA-compliant payments. Built for solo attorneys and small law firms.
            </p>
            <div className="hero-ctas">
              <a href="#start" className="btn btn-primary btn-lg">Start now</a>
              <a href="#workflow" className="btn btn-ghost btn-lg">See the loop →</a>
            </div>
          </div>
        </div>
        <WorkflowHero />
      </div>
    </section>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    if (t.theme === "light") {
      delete document.documentElement.dataset.theme;
    } else {
      document.documentElement.dataset.theme = t.theme;
    }
  }, [t.theme]);

  return (
    <>
      <SiteNav />
      <main>
        <Hero />
        <ProblemSection />
        <WorkflowDetail />
        <FeatureCards />
        <ComplianceSection />
        <ComparisonSection />
        <PricingSection />
        <DocsHub />
        <FAQSection />
        <FinalCTA />
      </main>
      <FooterBlock />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            label="Mode"
            value={t.theme}
            options={[
              { value: "light", label: "Light" },
              { value: "dark", label: "Dark" }
            ]}
            onChange={(v) => setTweak("theme", v)}
          />
          <TweakSelect
            label="Palette"
            value={t.theme}
            options={[
              { value: "light", label: "Light · ivory + navy + gold" },
              { value: "dark", label: "Dark · navy + cream + gold" },
              { value: "midnight", label: "Midnight · deep navy + bright gold" },
              { value: "parchment", label: "Parchment · warm cream + deep gold" }
            ]}
            onChange={(v) => setTweak("theme", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
